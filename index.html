<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primer Cumpleaños de Emma</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #fce4ec;
            --accent-pink: #f06292;
            --soft-lavender: #f3e5f5;
            --accent-purple: #ba68c8;
            --mint: #e8f5e9;
            --accent-mint: #81c784;
            --text-color: #4a4a4a;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--text-color);
            background-color: var(--white);
            line-height: 1.6;
            overflow-x: hidden;
            width: 100%;
            max-width: 100vw;
        }

        /* Global animation styles for components to use */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        emma-invitation {
            display: block;
            margin-left: auto;
            margin-right: auto;
            max-width: 1000px;
            width: 90%;
        }
    </style>
</head>
<body>

    <emma-hero></emma-hero>
    <emma-gallery></emma-gallery>
    <emma-invitation></emma-invitation>
    <emma-rsvp></emma-rsvp>
    <emma-footer></emma-footer>

    <script src="photos.js"></script>
    <script>
        // --- Web Components Definitions ---

        const observerOptions = { threshold: 0.1 };
        const globalObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.shadowRoot.querySelectorAll('.animate').forEach(el => {
                        el.classList.add('visible');
                    });
                }
            });
        }, observerOptions);

        // 1. Hero Component
        customElements.define('emma-hero', class extends HTMLElement {
            constructor() {
                super();
                this.attachShadow({ mode: 'open' });
                this.shadowRoot.innerHTML = `
                    <style>
                        :host { display: block; }
                        header {
                            height: 100vh;
                            display: flex;
                            flex-direction: column;
                            justify-content: center;
                            align-items: center;
                            background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), 
                                        url('photos/cute_fruits_animals_background.png');
                            background-size: cover;
                            background-position: center;
                            position: relative;
                            text-align: center;
                        }
                        h1 { font-family: 'Playfair Display', serif; font-size: 4.5rem; color: var(--accent-pink, #f06292); margin-bottom: 10px; }
                        h2 { font-family: 'Dancing Script', cursive; font-size: 2.5rem; }
                        p { font-family: 'Montserrat', sans-serif; font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; }
                        .animate { opacity: 0; transition: opacity 1s ease, transform 1s ease; transform: translateY(20px); }
                        .visible { opacity: 1; transform: translateY(0); }
                        .scroll-indicator { position: absolute; bottom: 30px; animation: float 2s infinite ease-in-out; font-size: 2rem; color: var(--accent-pink); }
                        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
                        @media (max-width: 768px) { h1 { font-size: 3rem; } }
                    </style>
                    <header>
                        <div class="hero-content">
                            <h2 class="animate">Un Año Maravilloso</h2>
                            <h1 class="animate">¡Emma cumple UN AÑO!</h1>
                            <p class="animate">Acompáñanos en una celebración mágica</p>
                        </div>
                        <div class="scroll-indicator">↓</div>
                    </header>
                `;
            }
            connectedCallback() { globalObserver.observe(this); }
        });

        // 2. Gallery Component
        customElements.define('emma-gallery', class extends HTMLElement {
            constructor() {
                super();
                this.attachShadow({ mode: 'open' });
                this.shadowRoot.innerHTML = `
                    <style>
                        :host { display: block; padding: 80px 20px; box-sizing: border-box; width: 100%; margin: 0 auto; text-align: center; overflow: hidden; }
                        h2 { font-family: 'Playfair Display', serif; margin-bottom: 10px; font-size: 2.5rem; }
                        .gallery-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 40px; max-width: 1200px; margin-left: auto; margin-right: auto; }
                        .gallery-item { position: relative; overflow: hidden; border-radius: 15px; width: 300px; max-width: 100%; aspect-ratio: 1 / 1; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: transform 0.3s ease; }
                        .gallery-item:hover { transform: scale(1.03); }
                        .gallery-item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; user-select: none; -webkit-user-drag: none; }
                        .animate { opacity: 0; transition: opacity 1s ease, transform 1s ease; transform: translateY(20px); }
                        .visible { opacity: 1; transform: translateY(0); }
                    </style>
                    <h2 class="animate">Nuestro Rayito de Sol</h2>
                    <p class="animate">Un año lleno de amor, risas y pequeños grandes momentos.</p>
                    <div class="gallery-grid">
                        ${(window.galleryPhotos || []).map(src => `<div class="gallery-item animate" oncontextmenu="return false;"><img src="photos/${src}" alt="Emma milestone" loading="lazy" draggable="false"></div>`).join('')}
                    </div>
                `;
            }
            connectedCallback() { globalObserver.observe(this); }
        });

        // 3. Invitation Component
        customElements.define('emma-invitation', class extends HTMLElement {
            constructor() {
                super();
                this.attachShadow({ mode: 'open' });
                this.shadowRoot.innerHTML = `
                    <style>
                        :host { display: block; padding: 80px 20px; box-sizing: border-box; width: 100%; background-color: var(--primary-pink); border-radius: 50px; margin: 40px auto; max-width: 1000px; text-align: center; overflow: hidden; }
                        .invitation-card { 
                            background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url('photos/cute_invitation_background.png'); 
                            background-size: cover; 
                            background-position: center; 
                            padding: 50px; box-sizing: border-box; width: 100%; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); max-width: 600px; margin: 0 auto; border: 2px dashed var(--accent-pink); 
                        }
                        h2 { font-family: 'Dancing Script', cursive; font-size: 2.5rem; margin-bottom: 20px; }
                        .details { margin: 30px 0; font-size: 1.2rem; font-family: 'Montserrat', sans-serif; }
                        .accent-text { color: var(--accent-pink); font-weight: 600; }
                        .countdown-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 30px; }
                        .countdown-item { background: var(--primary-pink); padding: 10px; border-radius: 12px; min-width: 70px; }
                        .countdown-item span { display: block; font-size: 1.5rem; font-weight: 700; color: var(--accent-pink); }
                        .countdown-item label { font-size: 0.7rem; text-transform: uppercase; font-weight: 600; }
                        .animate { opacity: 0; transition: opacity 1s ease, transform 1s ease; transform: translateY(20px); }
                        .visible { opacity: 1; transform: translateY(0); }
                        .map-container { position: relative; width: 100%; height: 0; padding-bottom: 56.25%; /* 16:9 Aspect Ratio */ margin-top: 20px; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
                        .map-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
                        @media (max-width: 768px) { .invitation-card { padding: 30px; } }
                    </style>
                    <div class="invitation-card animate">
                        <h2>¡Estás Invitado!</h2>
                        <div class="details">
                            <p><span class="accent-text">CUÁNDO:</span> Sábado, 14 de Marzo</p>
                            <p><span class="accent-text">HORA:</span> 4:00 PM</p>
                            <p><span class="accent-text">DÓNDE:</span> <a href="https://maps.app.goo.gl/qHWdgdts5Wck8QrP9" target="_blank" style="color: var(--text-color); text-decoration: none;">📍 Parque César Vallejo | Ca. Monte Flor 244, Lima, Santiago de Surco</a></p>
                            
                            <div class="map-container">
                                <iframe 
                                    src="https://maps.google.com/maps?q=Parque%20C%C3%A9sar%20Vallejo,%20Ca.%20Monte%20Flor%20244,%20Santiago%20de%20Surco&t=&z=16&ie=UTF8&iwloc=&output=embed" 
                                    allowfullscreen="" 
                                    loading="lazy" 
                                    referrerpolicy="no-referrer-when-downgrade">
                                </iframe>
                            </div>
                        </div>
                        <div id="countdown" class="countdown-container">
                            <div class="countdown-item"><span id="days">00</span><label>Días</label></div>
                            <div class="countdown-item"><span id="hours">00</span><label>Horas</label></div>
                            <div class="countdown-item"><span id="minutes">00</span><label>Min</label></div>
                            <div class="countdown-item"><span id="seconds">00</span><label>Seg</label></div>
                        </div>
                        <p>Acompáñanos a disfrutar de pastel, juegos y mucha diversión para celebrar el primer añito de Emma.</p>
                    </div>
                `;
            }
            connectedCallback() {
                globalObserver.observe(this);
                this.startTimer();
            }
            startTimer() {
                const birthdayDate = new Date("March 14, 2026 16:00:00").getTime();
                const update = () => {
                    const now = new Date().getTime();
                    const distance = birthdayDate - now;
                    if (distance < 0) {
                        this.shadowRoot.getElementById("countdown").innerHTML = "<h3>¡Es hora de la fiesta!</h3>";
                        return;
                    }
                    this.shadowRoot.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
                    this.shadowRoot.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
                    this.shadowRoot.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                    this.shadowRoot.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
                };
                setInterval(update, 1000);
                update();
            }
        });

        // 4. RSVP Component
        customElements.define('emma-rsvp', class extends HTMLElement {
            constructor() {
                super();
                this.attachShadow({ mode: 'open' });
                this.shadowRoot.innerHTML = `
                    <style>
                        :host { display: block; padding: 80px 20px; box-sizing: border-box; width: 100%; text-align: center; overflow: hidden; }
                        h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 10px; }
                        form { max-width: 500px; width: 100%; box-sizing: border-box; margin: 40px auto; text-align: left; }
                        .form-group { margin-bottom: 20px; }
                        label { display: block; margin-bottom: 5px; font-weight: 600; font-family: 'Montserrat', sans-serif; }
                        input, select, textarea { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
                        button { background-color: var(--accent-pink); color: white; border: none; padding: 15px 30px; border-radius: 30px; font-size: 1.1rem; cursor: pointer; width: 100%; transition: background 0.3s ease; font-weight: 600; box-sizing: border-box; }
                        button:hover { background-color: #e91e63; }
                        .animate { opacity: 0; transition: opacity 1s ease, transform 1s ease; transform: translateY(20px); }
                        .visible { opacity: 1; transform: translateY(0); }
                    </style>
                    <h2 class="animate">¿Podrás venir?</h2>
                    <p class="animate">Por favor, confírmanos tu asistencia</p>
                    <form class="animate" id="rsvpForm">
                        <div class="form-group">
                            <label for="name">Tu Nombre</label>
                            <input type="text" id="name" required placeholder="Escribe tu nombre completo">
                        </div>
                        <div class="form-group">
                            <label for="guests">Número de Invitados</label>
                            <select id="guests">
                                <option value="1">1 Persona</option>
                                <option value="2">2 Personas</option>
                                <option value="3">3 Personas</option>
                                <option value="4">4 o más personas</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="message">Mensaje para Emma (Opcional)</label>
                            <textarea id="message" rows="4" placeholder="Escribe algo lindo..."></textarea>
                        </div>
                        <button type="submit">Enviar Confirmación</button>
                    </form>
                `;
            }
            connectedCallback() {
                globalObserver.observe(this);
                this.shadowRoot.getElementById('rsvpForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const name = this.shadowRoot.getElementById('name').value;
                    const guestsSelect = this.shadowRoot.getElementById('guests');
                    const guestsText = guestsSelect.options[guestsSelect.selectedIndex].text;
                    const message = this.shadowRoot.getElementById('message').value;
                    
                    // REEMPLAZA ESTO CON TU NÚMERO DE TELÉFONO
                    // Debe incluir código de país, sin el '+' ni espacios.
                    // Ejemplo: para México usa '525512345678', para España usa '34612345678'
                    const phoneNumber = '330672394680'; 
                    
                    let text = `¡Hola! Confirmo mi asistencia al cumpleaños de Emma.\n\n`;
                    text += `*Nombre:* ${name}\n`;
                    text += `*Invitados:* ${guestsText}\n`;
                    
                    if (message.trim() !== '') {
                        text += `*Mensaje para Emma:* ${message}`;
                    }
                    
                    const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(text)}`;
                    window.open(whatsappUrl, '_blank');
                    
                    e.target.reset();
                });
            }
        });

        // 5. Footer Component
        customElements.define('emma-footer', class extends HTMLElement {
            constructor() {
                super();
                this.attachShadow({ mode: 'open' });
                this.shadowRoot.innerHTML = `
                    <style>
                        footer { padding: 40px; background-color: var(--mint, #e8f5e9); text-align: center; }
                        .cursive { font-family: 'Dancing Script', cursive; font-size: 1.5rem; margin-bottom: 10px; }
                        p { font-family: 'Montserrat', sans-serif; }
                    </style>
                    <footer>
                        <p class="cursive">With ❤️ by WM</p>
                        <p>&copy; 2026 El Primer Cumpleaños de Emma</p>
                    </footer>
                `;
            }
        });
    </script>
</body>
</html>
